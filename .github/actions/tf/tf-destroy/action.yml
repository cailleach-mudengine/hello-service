name: 'Terraform Local Destroy'
description: "Performs a Terraform Destroy"
inputs:
  initiative:
    required: true
  environment:
    required: true
  service_name:
    required: false
  revision:
    required: false
  is_infra_script:
    type: boolean
    required: true  
  git_organization:
    required: true
  aws_bucket_prefix:
    required: true    
  aws_region:
    required: true
    description: Region where to run Terraform script
  shared_client_id:
    required: true
  shared_secret:
    required: true
  aws_github_role:
    required: true
    description: Role to be used to run Terraform script
  aws_main_role:
    required: true
    description: Role to be used to run Terraform script
  aws_admin_role:
    required: true
    description: Additional role to access AWS Core Account

runs:
  using: "composite"
  steps:
    - name: Checkout
      uses: actions/checkout@v7
      
    - name: Prepare Environment
      uses: cailleach-devops/aws-shared-actions/.github/actions/tf/tf-prepare@main
      with:
        initiative: ${{ inputs.initiative }}
        environment: ${{ inputs.environment }}
        service_name: ${{ inputs.service_name }}
        revision: ${{ inputs.revision }}
        git_organization: ${{ inputs.git_organization }}
        is_infra_script: ${{ inputs.is_infra_script }}        
        aws_bucket_prefix: ${{ inputs.aws_bucket_prefix }}
        aws_region: ${{ inputs.aws_region }}
        shared_client_id: ${{ inputs.shared_client_id }}
        shared_secret: ${{ inputs.shared_secret }}
        aws_github_role: ${{ inputs.aws_github_role }}
        aws_main_role: ${{ inputs.aws_main_role }}
        aws_admin_role: ${{ inputs.aws_admin_role }}

    - name: Terraform Destroy
      working-directory: ./terraform
      shell: bash
      run: terraform destroy -input=false -auto-approve