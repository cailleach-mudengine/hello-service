name: 'AwsDeploy'

on:  
  workflow_call:
    inputs:
      initiative:
        type: string
        required: true
      environment:
        type: string
        required: true
      service-name:
        type: string
        required: false
      revision:
        type: string
        required: false
      git-organization:
        type: string
        required: true
      aws-bucket-prefix:
        type: string
        required: true    
      aws-region:
        type: string
        required: true
        description: Region where to run Terraform script
    secrets:
      shared-client-id:
        required: true
      shared-secret:
        required: true
      aws-github-role:
        required: true
        description: Role to be used to run Terraform script
      aws-main-role:
        required: true
        description: Role to be used to run Terraform script
      aws-admin-role:
        required: true
        description: Additional role to access AWS Core Account  

permissions:
  contents: read
  id-token: write

jobs:
  
  terraform-destroy:
    runs-on: ubuntu-latest

    steps:
    - id: checkout
      name: checkout
      uses: actions/checkout@v7
      
    - name: "Terraform Deploy"
      uses: cailleach-devops/aws-shared-actions/.github/actions/tf/tf-deploy@main
      with:
        aws-bucket-prefix: ${{ inputs.aws-bucket-prefix }}
        aws-admin-role: ${{ secrets.aws-admin-role }}
        aws-github-role: ${{ secrets.aws-github-role }}
        aws-main-role: ${{ secrets.aws-main-role }}
        aws-region: ${{ inputs.aws-region }}
        shared-client-id: ${{ secrets.shared-client-id }}
        shared-secret: ${{ secrets.shared-secret }}
        is-infra-script: false
        initiative: ${{ inputs.initiative }}
        environment: ${{ inputs.environment }}
        git-organization: ${{ inputs.git-organization }}
        service-name: ${{ inputs.service-name }}
        revision: ${{ inputs.revision }}

  app-build:
    runs-on: ubuntu-latest
    steps:
    - id: checkout
      name: checkout
      uses: actions/checkout@v7

    - name: buildAndUnityTest
      uses: cailleach-mudengine/hello-service/.github/actions/node/node-build@feature/refactor
      with:
        node-version: '24'

  database-apply:
    runs-on: ubuntu-latest
    steps:
    - id: checkout
      name: checkout
      uses: actions/checkout@v7
      
    - name: "Someday"
      shell: bash
      run: echo "TO BE IMPLEMENTED..."

  app-publish:
    runs-on: ubuntu-latest
    needs: [ database-apply, terraform-apply, app-build]

    steps:
    - id: checkout
      name: checkout
      uses: actions/checkout@v7

    - name: Docker Deploy
      uses: cailleach-mudengine/hello-service/.github/actions/node/node-docker-deploy@feature/refactor
      with:
        node-version: '24'
        project-name: ${{ inputs.git-project }}
        service-name: ${{github.event.repository.name}}
        environment: ${{ inputs.environment}}
        revision: ${{ inputs.revision }}
        aws-region: ${{ inputs.aws-region }}
        aws-role: ${{ inputs.aws-role }}


  app-rollout:
    runs-on: ubuntu-latest
    needs: [ app-publish]

    steps:
    - name: Wait for Finish
      run: echo "Finished..."
