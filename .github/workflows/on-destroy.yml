name: 'OnDestroy'

on:  
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  starter-ecs-dev-publish:
    uses: cailleach-mudengine/hello-service/.github/workflows/node-ecs-destroy.yml@feature/refactor
    with:
      environment: 'dev'
      initiative: ${{ vars.INITIATIVE }}
      aws-bucket-prefix: ${{ vars.BUCKET_PREFIX }}
      aws-region: ${{ vars.DEV_AWS_REGION }}
      git-organization: ${{ github.repository_owner }}
      service_name: ${{ github.event.repository.name }}
      revision: 'latest'
    secrets:
      aws-admin-role: ${{ secrets.DEV_AWS_ADMIN_ROLE }}
      aws-github-role: ${{ secrets.DEV_AWS_GITHUB_ROLE }}
      aws-main-role: ${{ secrets.DEV_AWS_MASTER_ROLE }}
      shared-client-id: ${{ secrets.SHARED_CLIENT_ID }}
      shared-secret: ${{ secrets.SHARED_SECRET }}
